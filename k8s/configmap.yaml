apiVersion: v1
kind: ConfigMap
metadata:
  name: scanner-config
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  API_V1_PREFIX: "/api/v1"
  POSTGRES_DB: "scanner_db"
  POSTGRES_USER: "scanner"
  REDIS_URL: "redis://scanner-redis:6379/0"
  GROQ_MODEL: "llama-3.3-70b-versatile"
  NEXT_PUBLIC_API_URL: "https://scanner.yourdomain.com"
  NEXT_PUBLIC_WS_URL: "wss://scanner.yourdomain.com"
  RATE_LIMIT_FREE_RPM: "60"
  RATE_LIMIT_PRO_RPM: "300"
  MAX_CODE_SIZE_KB: "100"
  SCAN_CACHE_TTL_SECONDS: "86400"
---
# ⚠️  DO NOT commit real values here.
# Use kubectl create secret or an external secrets manager (e.g. AWS Secrets Manager + ESO).
apiVersion: v1
kind: Secret
metadata:
  name: scanner-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://scanner:CHANGE_ME@scanner-postgres:5432/scanner_db"
  POSTGRES_PASSWORD: "CHANGE_ME"
  JWT_SECRET: "CHANGE_ME_64_CHAR_HEX"
  GROQ_API_KEY: "gsk_CHANGE_ME"
  GITHUB_APP_ID: "CHANGE_ME"
  GITHUB_PRIVATE_KEY: "CHANGE_ME"
  GITHUB_WEBHOOK_SECRET: "CHANGE_ME"
