apiVersion: apps/v1
kind: Deployment
metadata:
  name: scanner-backend
  labels:
    app: scanner-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scanner-backend
  template:
    metadata:
      labels:
        app: scanner-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/YOUR_ORG/scanner-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: scanner-config
            - secretRef:
                name: scanner-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: scanner-backend
spec:
  selector:
    app: scanner-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scanner-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scanner-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
