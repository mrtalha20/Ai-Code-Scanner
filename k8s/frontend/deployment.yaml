apiVersion: apps/v1
kind: Deployment
metadata:
  name: scanner-frontend
  labels:
    app: scanner-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scanner-frontend
  template:
    metadata:
      labels:
        app: scanner-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/YOUR_ORG/scanner-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: scanner-config
                  key: NEXT_PUBLIC_API_URL
            - name: NEXT_PUBLIC_WS_URL
              valueFrom:
                configMapKeyRef:
                  name: scanner-config
                  key: NEXT_PUBLIC_WS_URL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: scanner-frontend
spec:
  selector:
    app: scanner-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
