version: "3.9"

services:
  backend:
    build:
      target: production
    command: >
      gunicorn app.main:app
      -w 4
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --timeout 120
      --graceful-timeout 30
      --max-requests 1000
      --max-requests-jitter 100
      --access-logfile -
      --error-logfile -
    volumes: []
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  frontend:
    build:
      target: production
    command: node server.js
    volumes: []
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
